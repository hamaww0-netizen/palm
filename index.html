<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PALM REAL ESATATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Tahoma', sans-serif; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4">

    <div id="loginSection" class="bg-slate-900 border border-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md mx-auto mt-20">
        <h2 class="text-xl font-bold text-center mb-6">PALM REAL ESATATE</h2>
        <form id="loginForm" class="space-y-4">
            <input type="text" id="loginUsername" placeholder="ناوی بەکارهێنەر" required class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white text-sm">
            <input type="password" id="loginPassword" placeholder="پاسۆرد" required class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white text-sm">
            <button type="submit" id="loginBtn" class="w-full bg-blue-600 py-3 rounded-xl text-sm font-bold">چوونەژوورەوە 🔒</button>
        </form>
    </div>

    <div id="adminSection" class="hidden w-full max-w-7xl mx-auto space-y-6">
        <header class="bg-slate-900 p-5 rounded-2xl flex justify-between items-center">
            <h1 class="text-lg font-bold">کۆنتڕۆڵی گشتی 🌐</h1>
            <button onclick="logout()" class="text-red-400 bg-red-950/50 px-4 py-2 rounded-xl text-xs">چوونەدەرەوە ↩</button>
        </header>

        <section class="bg-slate-900 p-6 rounded-xl border border-slate-800">
            <h3 class="text-sm font-bold mb-4 text-blue-400">🧾 وەسڵی مەسروفات</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-right border-collapse text-xs">
                    <thead><tr class="text-slate-400 border-b border-slate-800"><th class="p-3">ڕێکەوت</th><th class="p-3">بڕ</th><th class="p-3">مەبەست</th><th class="p-3 text-center">کردار</th></tr></thead>
                    <tbody id="voucherTableBody" class="divide-y divide-slate-800/50"></tbody>
                </table>
            </div>
        </section>
    </div>

    <div id="printModal" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4">
        <div id="voucherPrintArea" class="bg-white text-black w-full max-w-sm p-6 rounded-xl text-center">
            <h2 class="text-xl font-bold border-b pb-2 mb-4">وەسڵی مەسروفات - PALM</h2>
            <div class="text-right text-sm">
                <p>ڕێکەوت: <span id="v_date"></span></p>
                <p>مەبەست: <span id="v_reason"></span></p>
                <p class="text-xl font-bold mt-4 border-t pt-2">بڕی: $<span id="v_amount"></span></p>
            </div>
            <div class="flex gap-2 mt-6 no-print">
                <button onclick="window.print()" class="flex-1 bg-blue-600 text-white py-2 rounded-xl">چاپ 🖨️</button>
                <button onclick="document.getElementById('printModal').classList.add('hidden')" class="flex-1 bg-gray-400 text-white py-2 rounded-xl">داخستن</button>
            </div>
        </div>
    </div>

    <script>
        const supabaseClient = supabase.createClient("https://nmkoruhacuftnoniwglk.supabase.co", "sb_publishable_87xvU2VSgVnhhOQeqdmSMg_pgy9wxZ4");

        // لۆگین
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = document.getElementById('loginUsername').value.trim();
            const pass = document.getElementById('loginPassword').value;
            let { data } = await supabaseClient.from('employees').select('*').eq('ناو', user).eq('پاسۆرد', pass);
            
            if (data && data.length > 0) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('adminSection').classList.remove('hidden');
                fetchVouchers();
            } else {
                alert("زانیاری هەڵەیە!");
            }
        });

        // هێنانی وەسڵەکان
        async function fetchVouchers() {
            let { data: vouchers } = await supabaseClient.from('vouchers').select('*').order('id', { ascending: false });
            const tbody = document.getElementById('voucherTableBody');
            tbody.innerHTML = '';
            if(vouchers) {
                vouchers.forEach(v => {
                    const d = new Date(v.created_at).toLocaleDateString('ku-Arab');
                    tbody.innerHTML += `<tr>
                        <td class="p-3 text-slate-400">${d}</td>
                        <td class="p-3 text-red-400 font-bold">$${Number(v.amount).toLocaleString()}</td>
                        <td class="p-3">${v.reason}</td>
                        <td class="p-3 text-center">
                            <button onclick="printVoucher('${d}','${v.reason}','${v.amount}')" class="text-blue-400">🖨️</button>
                            <button onclick="deleteVoucher(${v.id})" class="text-red-500 mr-3">🗑️</button>
                        </td>
                    </tr>`;
                });
            }
        }

        function printVoucher(d, r, a) {
            document.getElementById('v_date').innerText = d;
            document.getElementById('v_reason').innerText = r;
            document.getElementById('v_amount').innerText = a;
            document.getElementById('printModal').classList.remove('hidden');
        }

        async function deleteVoucher(id) {
            if(confirm("دڵنیایت لە سڕینەوە؟")) {
                await supabaseClient.from('vouchers').delete().eq('id', id);
                fetchVouchers();
            }
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
