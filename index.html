<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>PALM REAL ESTATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @media print {
            body * { visibility: hidden; }
            #voucherPrintArea, #voucherPrintArea * { visibility: visible; }
            #voucherPrintArea { position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none; }
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

    <div id="loginSection" class="flex items-center justify-center min-h-screen">
        <form id="loginForm" class="bg-slate-900 p-8 rounded-2xl shadow-xl w-full max-w-sm text-center">
            <h2 class="text-2xl font-bold mb-6">PALM REAL ESTATE</h2>
            <input id="loginUsername" type="text" placeholder="ناوی بەکارهێنەر" class="w-full p-3 mb-4 rounded-xl bg-slate-800 border border-slate-700" required>
            <input id="loginPassword" type="password" placeholder="پاسۆرد" class="w-full p-3 mb-6 rounded-xl bg-slate-800 border border-slate-700" required>
            <button id="loginBtn" type="submit" class="w-full bg-blue-600 py-3 rounded-xl">چوونەژوورەوە 🔒</button>
        </form>
    </div>

    <div id="adminSection" class="hidden p-8">
        <table class="w-full text-right border-collapse">
            <thead>
                <tr class="border-b border-slate-700">
                    <th class="p-3">ڕێکەوت</th>
                    <th class="p-3">بڕ</th>
                    <th class="p-3">مەبەست</th>
                    <th class="p-3 text-center">کردار</th>
                </tr>
            </thead>
            <tbody id="voucherTableBody"></tbody>
        </table>
    </div>

    <div id="printModal" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4">
        <div id="voucherPrintArea" class="bg-white text-black w-full max-w-sm p-6 rounded-xl shadow-2xl text-center">
            <h2 class="text-xl font-bold border-b-2 border-black pb-2 mb-4">وەسڵی مەسروفات</h2>
            <div class="text-right text-sm font-bold">
                <p>ڕێکەوت: <span id="v_date"></span></p>
                <p>مەبەست: <span id="v_reason"></span></p>
                <p class="text-2xl mt-4 border-t border-black pt-2">بڕی: $<span id="v_amount"></span></p>
            </div>
            <div class="flex gap-2 mt-6 no-print">
                <button onclick="window.print()" class="flex-1 bg-blue-600 text-white py-2 rounded-xl">چاپکردن 🖨️</button>
                <button onclick="document.getElementById('printModal').classList.add('hidden')" class="flex-1 bg-gray-400 text-white py-2 rounded-xl">داخستن</button>
            </div>
        </div>
    </div>

    <script>
        const supabaseClient = supabase.createClient('https://nmkoruhacuftnoniwglk.supabase.co', 'sb_publishable_87xvU2VSgVnhhOQeqdmSMg_pgy9wxZ4');

        // لۆگین
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = document.getElementById('loginUsername').value;
            const pass = document.getElementById('loginPassword').value;
            
            let { data, error } = await supabaseClient.from('employees').select('*').eq('ناو', user).eq('پاسۆرد', pass);
            
            if (data && data.length > 0) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('adminSection').classList.remove('hidden');
                fetchAdminData();
            } else {
                alert("زانیارییەکان هەڵەن!");
            }
        });

        // هێنانەوەی وەسڵەکان
        async function fetchAdminData() {
            const vTbody = document.getElementById('voucherTableBody');
            vTbody.innerHTML = '';
            let { data: vouchers } = await supabaseClient.from('vouchers').select('*').order('id', { ascending: false });
            
            if(vouchers) {
                vouchers.forEach(v => {
                    const dateStr = new Date(v.created_at).toLocaleDateString('ku-Arab');
                    const vTr = document.createElement('tr');
                    vTr.innerHTML = `
                        <td class="p-3 text-slate-400">${dateStr}</td>
                        <td class="p-3 text-red-400 font-bold">$${Number(v.amount).toLocaleString()}</td>
                        <td class="p-3 text-white">${v.reason}</td>
                        <td class="p-3 text-center">
                            <button onclick="printSpecificVoucher('${dateStr}', '${v.reason}', '${Number(v.amount).toLocaleString()}')" class="text-blue-400 hover:underline ml-3">🖨️ چاپ</button>
                            <button onclick="deleteVoucher(${v.id})" class="text-red-500 hover:underline">🗑️ سڕینەوە</button>
                        </td>
                    `;
                    vTbody.appendChild(vTr);
                });
            }
        }

        function printSpecificVoucher(date, reason, amount) {
            document.getElementById('v_date').innerText = date;
            document.getElementById('v_reason').innerText = reason;
            document.getElementById('v_amount').innerText = amount;
            document.getElementById('printModal').classList.remove('hidden');
        }

        async function deleteVoucher(id) {
            if (confirm("⚠️ دڵنیایت لە سڕینەوە؟")) {
                await supabaseClient.from('vouchers').delete().eq('id', id);
                fetchAdminData();
            }
        }
    </script>
</body>
</html>
