<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PALM REAL ESTATE - سیستم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>body { font-family: 'Tahoma', sans-serif; } @media print { .no-print { display: none !important; } }</style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4">

    <!-- لۆگین -->
    <div id="loginSection" class="max-w-md mx-auto mt-20 bg-slate-900 border border-slate-800 p-8 rounded-2xl">
        <h2 class="text-center text-xl font-bold mb-6">PALM REAL ESTATE</h2>
        <form id="loginForm" class="space-y-4">
            <input type="text" id="loginUsername" placeholder="ناوی بەکارهێنەر" required class="w-full bg-slate-800 p-3 rounded-xl border border-slate-700">
            <input type="password" id="loginPassword" placeholder="پاسۆرد" required class="w-full bg-slate-800 p-3 rounded-xl border border-slate-700">
            <button type="submit" id="loginBtn" class="w-full bg-blue-600 py-3 rounded-xl font-bold">چوونەژوورەوە</button>
        </form>
    </div>

    <!-- بەشی ئەدمین و ژمێریار -->
    <div id="adminSection" class="hidden max-w-7xl mx-auto space-y-6">
        <header class="flex justify-between items-center bg-slate-900 p-6 rounded-2xl border border-slate-800">
            <h1 class="font-bold text-lg">کۆنتڕۆڵی گشتی (ئەدمین و ژمێریار)</h1>
            <button onclick="logout()" class="text-red-400 bg-red-950/50 px-4 py-2 rounded-xl text-xs">چوونەدەرەوە</button>
        </header>

        <div class="grid grid-cols-1 xl:grid-cols-2 gap-6">
            <!-- زیادکردنی موڵک و فرۆشتن -->
            <div class="space-y-4">
                <section class="bg-slate-900 border border-slate-800 p-4 rounded-xl">
                    <h3 class="text-blue-400 font-bold mb-3">🏢 ١. زیادکردنی موڵکی نوێ</h3>
                    <form id="adminAddPropForm" class="flex gap-2">
                        <input type="text" id="adminPropTitle" placeholder="ناوی موڵک" required class="w-full bg-slate-800 p-2 rounded-lg text-xs">
                        <input type="number" id="adminPropPrice" placeholder="نرخ" required class="w-24 bg-slate-800 p-2 rounded-lg text-xs">
                        <button type="submit" class="bg-blue-600 px-4 rounded-lg text-xs">تۆمار</button>
                    </form>
                </section>

                <section class="bg-slate-900 border border-slate-800 p-4 rounded-xl">
                    <h3 class="text-emerald-400 font-bold mb-3">💰 ٢. فرۆشتنی موڵک</h3>
                    <form id="adminFinanceForm" class="space-y-2">
                        <select id="adminPropertySelect" class="w-full bg-slate-800 p-2 rounded-lg text-xs"></select>
                        <input type="number" id="adminSalePrice" placeholder="نرخی فرۆشتن" required class="w-full bg-slate-800 p-2 rounded-lg text-xs">
                        <button type="submit" class="w-full bg-emerald-600 py-2 rounded-lg text-xs">تۆمارکردنی فرۆشتن</button>
                    </form>
                </section>
            </div>

            <!-- بەشی ژمێریار (وەسڵکردنی موڵکە فرۆشراوەکان) -->
            <section class="bg-slate-900 border border-slate-800 p-4 rounded-xl">
                <h3 class="text-amber-400 font-bold mb-3">🖨️ ٣. لیستی موڵکە فرۆشراوەکان (بۆ ژمێریار)</h3>
                <table class="w-full text-xs text-right">
                    <thead><tr class="text-slate-500 border-b border-slate-800"><th class="p-2">موڵک</th><th class="p-2">نرخ</th><th class="p-2">کردار</th></tr></thead>
                    <tbody id="paymentQueueBody"></tbody>
                </table>
            </section>
        </div>
    </div>

    <!-- مۆدۆڵی وەسڵ -->
    <div id="printModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4">
        <div class="bg-white text-slate-900 w-full max-w-sm rounded-xl p-6">
            <div id="printSection" class="text-right border-2 border-slate-900 p-4">
                <h2 class="font-bold text-center">وەسڵی پارەدان - PALM</h2>
                <div class="mt-4 text-xs space-y-2">
                    <p>ژمارە: <span id="p_id"></span></p>
                    <p>مەبەست: <span id="p_reason"></span></p>
                    <p class="font-bold text-lg">بڕ: <span id="p_amount"></span></p>
                </div>
            </div>
            <div class="flex gap-2 mt-4 no-print">
                <button onclick="window.print()" class="flex-1 bg-green-600 text-white py-2 rounded">چاپکردن</button>
                <button onclick="closeModal()" class="flex-1 bg-gray-300 py-2 rounded">داخستن</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://nmkoruhacuftnoniwglk.supabase.co";
        const SUPABASE_KEY = "sb_publishable_87xvU2VSgVnhhOQeqdmSMg_pgy9wxZ4";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // لۆگین
        document.getElementById('loginForm').addEventListener('submit', async(e) => {
            e.preventDefault();
            const user = document.getElementById('loginUsername').value;
            const pass = document.getElementById('loginPassword').value;
            let { data, error } = await supabase.from('employees').select('*').eq('ناو', user).eq('پاسۆرد', pass);
            if(data && data.length > 0) {
                localStorage.setItem('user', data[0].ناو);
                location.reload();
            } else alert("هەڵەیە!");
        });

        // هێنانی داتا
        async function loadData() {
            let { data: props } = await supabase.from('properties').select('*');
            const select = document.getElementById('adminPropertySelect');
            const queueBody = document.getElementById('paymentQueueBody');
            select.innerHTML = '<option>موڵکێک هەڵبژێره</option>';
            queueBody.innerHTML = '';

            props.forEach(p => {
                if(p.status !== 'sold') {
                    select.innerHTML += `<option value="${p.id}">${p.title}</option>`;
                } else {
                    queueBody.innerHTML += `<tr><td class="p-2">${p.title}</td><td class="p-2">$${p.sale_price}</td>
                    <td class="p-2"><button onclick="printVoucher('${p.title}', ${p.sale_price})" class="bg-amber-600 px-2 py-1 rounded text-[10px]">وەسڵکردن</button></td></tr>`;
                }
            });
        }

        // تۆماری فرۆشتن
        document.getElementById('adminFinanceForm').addEventListener('submit', async(e) => {
            e.preventDefault();
            const id = document.getElementById('adminPropertySelect').value;
            const price = document.getElementById('adminSalePrice').value;
            await supabase.from('properties').update({ status: 'sold', sale_price: price }).eq('id', id);
            loadData();
        });

        function printVoucher(title, amount) {
            document.getElementById('p_id').innerText = Math.floor(Math.random()*10000);
            document.getElementById('p_reason').innerText = "فرۆشتنی " + title;
            document.getElementById('p_amount').innerText = "$" + amount;
            document.getElementById('printModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('printModal').classList.add('hidden'); }
        function logout() { localStorage.clear(); location.reload(); }

        if(localStorage.getItem('user')) {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('adminSection').classList.remove('hidden');
            loadData();
        }
    </script>
</body>
</html>
